<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories M.3</title>
    <!-- นำเข้า Font 'Mali' สำหรับภาษาไทยและอังกฤษแนวลายมือ -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <!-- ========================================== -->
    <!-- เริ่มต้นส่วนของ HTML -->
    <!-- ========================================== -->
    <div class="container">
        
        <!-- Header -->
        <header>
            <h1 class="main-title">
                💖 Memories <span>M.3</span> ✈️
            </h1>
        </header>

        <div class="dashed-line"></div>

        <!-- Section 1: Our Memories (Gallery) -->
        <section class="gallery-section">
            <h2 class="section-title">💗 Our Memories 💗</h2>
            
            <div class="gallery-grid">
                <div class="polaroid">
                    <!-- รูปภาพ Placeholder -->
                    <img src="img/1.jpg" alt="เพื่อนกลุ่ม 1">
                </div>
                <div class="polaroid">
                    <img src="img/2.jpg" alt="เพื่อนกลุ่ม 2">
                </div>
                <div class="polaroid">
                    <img src="img/3.jpg" alt="เพื่อนกลุ่ม 3">
                </div>
                <div class="polaroid">
                    <img src="img/4.jpg" alt="เพื่อนกลุ่ม 4">
                </div>
                <div class="polaroid">
                    <img src="img/5.jpg" alt="เพื่อนกลุ่ม 5">
                </div>
            </div>

            <a href="#" class="btn-view-more">✨ View More Photos ❯</a>
        </section>

        <div class="dashed-line"></div>

        <!-- Section 2: Fun Times Together (Video) -->
        <section class="video-section">
    <h2 class="section-title">💛 Fun Times Together ✨</h2>
    
            <div class="video-container">
                <iframe width="245" height="140"
                src="img/received_789309239912126.mp4"
                frameborder="0"
                allowfullscreen>
                </iframe>
            </div>
    
            <div class="video-caption">
                <h3>School Trip 2023</h3>
                <p>Unforgettable Moments!</p>
            </div>
        </section>

        <div class="dashed-line"></div>

        <!-- Section 3: Friends' Messages -->
        <section class="messages-section">
            <h2 class="section-title">💛 Friends' Messages 💛</h2>
            
            <div class="messages-container">
                <div class="bubble left">
                    Best time ever! <span>- M.3/1</span>
                </div>
                <div class="bubble right">
                    ไม่เคยลืมเลย! <span>- M.3/1</span>
                </div>
                <div class="bubble center">
                    รักแกทุกคนนะ <span>- M.3/1</span>
                </div>
            </div>
        </section>

    </div>
    <!-- ========================================== -->
    <!-- สิ้นสุดส่วนของ HTML -->
    <!-- ========================================== -->

</body>
</html>
